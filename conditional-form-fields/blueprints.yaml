name: Conditional Form Fields
slug: conditional-form-fields
type: plugin
version: 0.1.0
description: Conditional form fields
icon: plug
author:
  name: oskar
  email: oskarvitko16@gmail.com
homepage: https://github.com/oskar/grav-plugin-conditional-form-fields
demo: http://demo.yoursite.com
keywords: grav, plugin, etc
bugs: https://github.com/oskar/grav-plugin-conditional-form-fields/issues
docs: https://github.com/oskar/grav-plugin-conditional-form-fields/blob/develop/README.md
license: MIT

dependencies:
  - { name: grav, version: '>=1.6.0' }

form:
  validation: loose
  fields:
    enabled:
      type: toggle
      label: PLUGIN_ADMIN.PLUGIN_STATUS
      highlight: 1
      default: 0
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool
    text_var:
      type: text
      label: PLUGIN_CONDITIONAL_FORM_FIELDS.TEXT_VARIABLE
      help: PLUGIN_CONDITIONAL_FORM_FIELDS.TEXT_VARIABLE_HELP
